name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lane1_test
          POSTGRES_USER: lane1_app
          POSTGRES_PASSWORD: lane1_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lane1_app -d lane1_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://lane1_app:lane1_test_password@localhost:5432/lane1_test
      JWT_SIGNING_KEY: ci-only-test-signing-key-not-for-production-0000
      CORS_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (alle Workspaces)
        run: npm ci

      - name: Abhängigkeits-Audit (npm audit)
        # Ergänzt nach dem Sicherheitsreview in Abschnitt 15/12 des
        # Backend-Entwicklungsplans — der Fund der nodemailer-CVEs (mehrere
        # High-Severity-Advisories) erfolgte dort durch einen manuell
        # angestoßenen Lauf, nicht durch eine automatisierte Prüfung.
        # Dieser Schritt schließt genau diese Lücke: künftige CVEs in
        # Produktionsabhängigkeiten lassen den PR-Check fehlschlagen, statt
        # unbemerkt bis zum nächsten manuellen Review liegen zu bleiben.
        #
        # --omit=dev: nur Produktionsabhängigkeiten zählen für das
        # Blockieren des Merges — eine Schwachstelle in einem reinen
        # Build-/Test-Tool (z. B. vitest/esbuild, siehe Abschnitt 12) hat
        # keine Auswirkung auf die ausgelieferte Anwendung und soll den
        # Merge nicht verhindern; sie bleibt trotzdem sichtbar (zweiter
        # Schritt unten, informativ statt blockierend).
        #
        # --audit-level=high (bewusst NICHT "critical"): Der real
        # gefundene nodemailer-Fund war als "high" eingestuft, nicht
        # "critical" — ein Schwellenwert von "critical" hätte genau diesen
        # Fund nicht automatisch erkannt und den ursprünglichen Zweck
        # dieses Schritts unterlaufen. "high" ist der niedrigste
        # Schwellenwert, der diesen konkreten Fall abgedeckt hätte, ohne
        # bei jeder harmlosen "moderate"/"low"-Meldung den Merge zu
        # blockieren. Bei Bedarf hier anpassbar (z. B. auf "critical"
        # lockern oder auf "moderate" verschärfen).
        run: npm audit --omit=dev --audit-level=high

      - name: Abhängigkeits-Audit — Dev-Abhängigkeiten (informativ, blockiert NICHT)
        # Deckt z. B. die bekannte esbuild/vite-Dev-Server-Schwachstelle ab
        # (siehe Abschnitt 12) — betrifft nur `npm run dev`/lokale
        # Testläufe, nicht die Produktionslaufzeit. `continue-on-error`,
        # damit sie im Job-Log sichtbar bleibt, aber den Merge nicht
        # blockiert; sollte dennoch zeitnah manuell geprüft werden.
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build gemeinsame Pakete (shared-types, sync-protocol)
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/sync-protocol

      - name: Prisma Client generieren
        # Direktes 'cd' statt --workspace=apps/api — unabhängig von npms
        # Pfad-/Namensauflösung für Workspaces, daher robuster gegen genau
        # diese Fehlerklasse ("No workspaces found").
        run: cd apps/api && npm run prisma:generate

      - name: Typecheck apps/api (inkl. test/, scripts/, prisma/)
        # WICHTIG: "Build apps/api" (unten) prüft per tsconfig.json NUR
        # src/ — Typfehler in Testdateien blieben dadurch lange unentdeckt,
        # obwohl vitest (esbuild, ohne Typprüfung) grün lief. Dieser Schritt
        # schließt genau diese Lücke.
        run: cd apps/api && npm run typecheck

      - name: Lint (alle Workspaces)
        run: npm run lint --workspaces --if-present

      - name: Test (alle Workspaces)
        run: npm run test --workspaces --if-present

      - name: Build apps/api
        run: cd apps/api && npm run build
