<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lane 1 · Trainingsmanagement</title>
<meta name="theme-color" content="#0B2E44">
<meta name="description" content="Offline-first Trainingsmanagement für Schwimmteams">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Phase 4: Login-/Einladungsannahme-Bildschirm — wird von app.js
     gerendert, solange keine gültige Sitzung besteht (bzw. immer für
     einen Einladungslink #/accept-invite/<token>). -->
<div id="auth-screen" class="auth-screen" hidden></div>

<div id="app-shell" hidden>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-brand">
      <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M2 22c3 0 3-3 6-3s3 3 6 3 3-3 6-3 3 3 6 3" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M2 16c3 0 3-3 6-3s3 3 6 3 3-3 6-3 3 3 6 3" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <span class="brand-name">Lane 1</span>
    </div>
    <div class="topbar-status">
      <span id="net-indicator" class="net-pill net-online" title="Verbindungsstatus">
        <span class="dot"></span><span class="net-label">Offline bereit</span>
      </span>
    </div>
    <div class="topbar-lang">
      <label for="language-select" class="sr-only">Sprache / Language</label>
      <select id="language-select" aria-label="Sprache / Language"></select>
    </div>
    <div class="topbar-user">
      <span id="current-user-label" class="current-user-label"></span>
      <button id="btn-logout" class="btn btn-ghost btn-sm" type="button"></button>
    </div>
  </header>

  <div class="app-body">
    <!-- Side nav -->
    <nav class="sidenav" id="sidenav" aria-label="Hauptnavigation">
      <ul id="nav-list"></ul>
      <div class="sidenav-footer">
        <button id="btn-settings" class="nav-textbtn">Einstellungen</button>
      </div>
    </nav>

    <!-- Main content -->
    <main id="view" class="view" tabindex="-1"></main>
  </div>

  <!-- Mobile bottom tabs -->
  <nav class="bottomnav" id="bottomnav" aria-label="Hauptnavigation mobil"></nav>
</div>

<!-- Außerhalb von #app-shell, damit Toasts/Modals auch auf dem
     Login-/Einladungsannahme-Bildschirm funktionieren. -->
<div id="toast-region" class="toast-region" aria-live="polite"></div>
<div id="modal-root" class="modal-root" hidden></div>

<template id="tpl-lanewave">
  <svg class="lanewave" viewBox="0 0 240 16" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0 8c10 0 10-6 20-6s10 6 20 6 10-6 20-6 10 6 20 6 10-6 20-6 10 6 20 6 10-6 20-6 10 6 20 6 10-6 20-6 10 6 20 6 10-6 20-6" fill="none" stroke="currentColor" stroke-width="2"/>
  </svg>
</template>

<script type="module" src="js/app.js"></script>
</body>
</html>
