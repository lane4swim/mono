# docker-compose.yml — lokale Entwicklungsumgebung (Phase 0).
# Start: docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lane1
      POSTGRES_USER: lane1_app
      POSTGRES_PASSWORD: lane1_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lane1_app -d lane1"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: "postgresql://lane1_app:lane1_dev_password@postgres:5432/lane1"
      JWT_SIGNING_KEY: "local-dev-only-key-not-for-production-use-12345"
      CORS_ORIGIN: "http://localhost:5173"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
